<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authensor Receipt Chain Visualizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1e;
    --bg-panel: #222228;
    --bg-input: #2a2a32;
    --bg-card: #2e2e38;
    --gold: #C9A227;
    --gold-dim: #9a7d1e;
    --gold-glow: rgba(201,162,39,0.15);
    --green: #4caf50;
    --green-bg: rgba(76,175,80,0.12);
    --green-border: rgba(76,175,80,0.4);
    --red: #ef5350;
    --red-bg: rgba(239,83,80,0.12);
    --red-border: rgba(239,83,80,0.4);
    --yellow: #ffc107;
    --yellow-bg: rgba(255,193,7,0.12);
    --yellow-border: rgba(255,193,7,0.4);
    --blue: #42a5f5;
    --gray: #888;
    --text: #e8e6e3;
    --text-dim: #999;
    --border: #3a3a44;
    --radius: 6px;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    flex-shrink: 0;
  }
  header .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
  }
  header .logo svg { width: 28px; height: 28px; }
  header .actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-input);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--gold); color: var(--gold); }
  .btn-gold {
    background: var(--gold);
    color: #111;
    border-color: var(--gold);
    font-weight: 600;
  }
  .btn-gold:hover { background: #ddb82e; color: #111; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Input panel */
  .input-panel {
    width: 420px;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-panel.collapsed { width: 0; min-width: 0; overflow: hidden; border-right: none; }
  .input-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
  }
  .input-panel textarea {
    flex: 1;
    padding: 16px;
    border: none;
    background: var(--bg-panel);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
    resize: none;
    outline: none;
  }
  .input-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--bg-panel);
  }

  /* Results panel */
  .results-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .stat .num {
    font-weight: 700;
    font-size: 18px;
  }
  .stat.allowed .num { color: var(--green); }
  .stat.denied .num { color: var(--red); }
  .stat.escalated .num { color: var(--yellow); }
  .stat.total .num { color: var(--gold); }

  .chain-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .chain-badge.valid {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    color: var(--green);
  }
  .chain-badge.broken {
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    color: var(--red);
  }

  .time-span { font-size: 12px; color: var(--text-dim); margin-left: auto; }

  /* Timeline */
  .timeline-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 24px 60px;
    position: relative;
  }

  .timeline-line {
    position: absolute;
    left: 79px;
    top: 24px;
    bottom: 24px;
    width: 2px;
    background: var(--border);
  }

  .receipt-node {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .receipt-node:hover .node-card { border-color: var(--gold-dim); }
  .receipt-node.selected .node-card { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-glow); }

  .node-dot {
    position: relative;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 3px solid;
    flex-shrink: 0;
    z-index: 2;
    margin-top: 14px;
  }
  .node-dot.allow { border-color: var(--green); background: var(--green-bg); }
  .node-dot.deny { border-color: var(--red); background: var(--red-bg); }
  .node-dot.escalate { border-color: var(--yellow); background: var(--yellow-bg); }
  .node-dot.rate_limited { border-color: var(--blue); background: rgba(66,165,245,0.12); }

  .node-dot::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .node-dot.allow::before { background: var(--green); }
  .node-dot.deny::before { background: var(--red); }
  .node-dot.escalate::before { background: var(--yellow); }
  .node-dot.rate_limited::before { background: var(--blue); }

  .node-connector {
    position: absolute;
    left: 9px;
    top: 34px;
    width: 2px;
    height: calc(100% + 8px);
    z-index: 1;
  }
  .node-connector.allow { background: var(--green-border); }
  .node-connector.deny { background: var(--red-border); }
  .node-connector.escalate { background: var(--yellow-border); }
  .node-connector.rate_limited { background: rgba(66,165,245,0.4); }

  .receipt-node:last-child .node-connector { display: none; }

  .node-card {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 0;
    transition: all 0.15s;
  }
  .node-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .node-action-type {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .node-decision-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .node-decision-badge.allow { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .node-decision-badge.deny { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .node-decision-badge.require_approval { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .node-decision-badge.rate_limited { background: rgba(66,165,245,0.12); color: var(--blue); border: 1px solid rgba(66,165,245,0.4); }

  .node-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .node-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .node-meta .hash {
    font-family: var(--font-mono);
    font-size: 11px;
    opacity: 0.7;
  }
  .node-reason {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }
  .node-aegis {
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .node-aegis.flagged {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid var(--red-border);
  }

  /* Detail Overlay */
  .detail-overlay {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 500px;
    max-width: 90vw;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 30px rgba(0,0,0,0.4);
  }
  .detail-overlay.open { transform: translateX(0); }
  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header h3 { font-size: 16px; color: var(--gold); }
  .detail-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }
  .detail-close:hover { color: var(--text); }
  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .detail-section {
    margin-bottom: 20px;
  }
  .detail-section h4 {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .detail-field {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }
  .detail-field .label { color: var(--text-dim); }
  .detail-field .value {
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    text-align: right;
    max-width: 60%;
    word-break: break-all;
  }
  .detail-json {
    background: var(--bg-input);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    color: var(--text-dim);
  }
  .detail-json .j-key { color: var(--gold); }
  .detail-json .j-str { color: var(--green); }
  .detail-json .j-num { color: #7cb7ff; }
  .detail-json .j-bool { color: #c792ea; }
  .detail-json .j-null { color: var(--gray); }

  /* Backdrop */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 199;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .backdrop.open { opacity: 1; pointer-events: auto; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }
  .empty-state svg { width: 64px; height: 64px; color: var(--border); }
  .empty-state p { font-size: 14px; line-height: 1.5; max-width: 360px; }

  /* Responsive */
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .input-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 300px; }
    .input-panel.collapsed { max-height: 0; }
    .timeline-container { padding-left: 50px; }
    .timeline-line { left: 69px; }
    .detail-overlay { width: 100%; max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="12" stroke="currentColor" stroke-width="2"/>
      <path d="M16 8v8l5.5 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Receipt Chain Visualizer
  </div>
  <div class="actions">
    <button class="btn" onclick="toggleInput()">Toggle Input</button>
    <button class="btn" onclick="loadExample(); visualize();">Reset Example</button>
  </div>
</header>

<div class="main">
  <!-- Input Panel -->
  <div class="input-panel" id="inputPanel">
    <div class="input-header">
      <span>Receipt Chain JSON <span style="font-weight:400;color:var(--text-dim);font-size:0.8em">(paste your own receipts here)</span></span>
      <span style="font-weight:400; color:var(--text-dim);" id="jsonCount"></span>
    </div>
    <textarea id="jsonInput" spellcheck="false" placeholder='Paste an array of receipt objects here...

[
  {
    "id": "...",
    "envelopeId": "...",
    "timestamp": "...",
    "decision": { "outcome": "allow", ... },
    "status": "executed",
    "receiptHash": "...",
    "prevReceiptHash": "..."
  },
  ...
]'></textarea>
    <div class="input-footer">
      <button class="btn btn-gold" onclick="visualize()">Visualize</button>
      <button class="btn" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Results Panel -->
  <div class="results-panel" id="resultsPanel">
    <div class="stats-bar" id="statsBar" style="display:none;"></div>
    <div class="timeline-container" id="timelineContainer">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 64 64" fill="none">
          <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="2"/>

          <line x1="16" y1="38" x2="40" y2="38" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <line x1="16" y1="44" x2="44" y2="44" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
        </svg>
        <p>Paste a JSON array of Authensor receipt objects and click <strong>Visualize</strong>, or click <strong>Load Example</strong> to see a demo session.</p>
      </div>
    </div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="backdrop" id="backdrop" onclick="closeDetail()"></div>
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-header">
    <h3 id="detailTitle">Receipt Detail</h3>
    <button class="detail-close" onclick="closeDetail()">&times;</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

let receipts = [];
let selectedIdx = -1;

// ── Visualize ──────────────────────────────────────────────
function visualize() {
  const raw = document.getElementById('jsonInput').value.trim();
  if (!raw) return;

  try {
    const parsed = JSON.parse(raw);
    receipts = Array.isArray(parsed) ? parsed : [parsed];
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
    return;
  }

  document.getElementById('jsonCount').textContent = `${receipts.length} receipts`;

  // Sort by timestamp
  receipts.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

  renderStats();
  renderTimeline();
}

// ── Outcome helpers ────────────────────────────────────────
function getOutcome(r) {
  return r.decision?.outcome || 'unknown';
}
function getOutcomeClass(r) {
  const o = getOutcome(r);
  if (o === 'allow') return 'allow';
  if (o === 'deny') return 'deny';
  if (o === 'require_approval') return 'escalate';
  if (o === 'rate_limited') return 'rate_limited';
  return 'deny';
}
function getOutcomeLabel(o) {
  if (o === 'require_approval') return 'escalated';
  if (o === 'rate_limited') return 'rate limited';
  return o;
}

// ── Chain integrity check ──────────────────────────────────
function checkChainIntegrity() {
  if (receipts.length < 2) return { valid: true, brokenAt: -1 };
  for (let i = 1; i < receipts.length; i++) {
    const prev = receipts[i - 1];
    const curr = receipts[i];
    if (curr.prevReceiptHash && prev.receiptHash && curr.prevReceiptHash !== prev.receiptHash) {
      return { valid: false, brokenAt: i };
    }
  }
  return { valid: true, brokenAt: -1 };
}

// ── Render stats bar ───────────────────────────────────────
function renderStats() {
  const bar = document.getElementById('statsBar');
  bar.style.display = 'flex';

  const counts = { allow: 0, deny: 0, require_approval: 0, rate_limited: 0 };
  receipts.forEach(r => {
    const o = getOutcome(r);
    if (counts[o] !== undefined) counts[o]++;
  });

  const chain = checkChainIntegrity();

  const t0 = new Date(receipts[0].timestamp);
  const tN = new Date(receipts[receipts.length - 1].timestamp);
  const spanMs = tN - t0;
  const spanSec = Math.round(spanMs / 1000);
  const spanStr = spanSec >= 60 ? `${Math.floor(spanSec/60)}m ${spanSec%60}s` : `${spanSec}s`;

  bar.innerHTML = `
    <div class="stat total"><span class="num">${receipts.length}</span> total</div>
    <div class="stat allowed"><span class="num">${counts.allow}</span> allowed</div>
    <div class="stat denied"><span class="num">${counts.deny}</span> denied</div>
    <div class="stat escalated"><span class="num">${counts.require_approval}</span> escalated</div>
    ${counts.rate_limited ? `<div class="stat" style="color:var(--blue)"><span class="num" style="color:var(--blue)">${counts.rate_limited}</span> rate limited</div>` : ''}
    <span class="chain-badge ${chain.valid ? 'valid' : 'broken'}">${
      chain.valid ? 'Valid Chain' : `Broken Chain at Receipt ${chain.brokenAt + 1}`
    }</span>
    <span class="time-span">Session span: ${spanStr}</span>
  `;
}

// ── Render timeline ────────────────────────────────────────
function renderTimeline() {
  const container = document.getElementById('timelineContainer');
  const chain = checkChainIntegrity();

  let html = '';
  receipts.forEach((r, idx) => {
    const oc = getOutcomeClass(r);
    const outcome = getOutcome(r);
    const actionType = r.envelope?.action?.type || r.envelopeId || 'unknown';
    const ts = new Date(r.timestamp);
    const timeStr = ts.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const hashShort = r.receiptHash ? r.receiptHash.substring(0, 12) + '...' : 'N/A';
    const resource = r.envelope?.action?.resource || '';
    const reason = r.decision?.reason || '';
    const isBroken = !chain.valid && chain.brokenAt === idx;
    const isAegisFlagged = r.metadata?.aegisFlagged;
    const durationMs = r.execution?.durationMs;
    const approvalStatus = r.approval?.status;

    html += `
      <div class="receipt-node ${selectedIdx === idx ? 'selected' : ''}" onclick="showDetail(${idx})" data-idx="${idx}">
        <div style="position:relative;">
          <div class="node-dot ${oc}"></div>
          <div class="node-connector ${oc}"></div>
        </div>
        <div class="node-card" ${isBroken ? 'style="border-color:var(--red);"' : ''}>
          <div class="node-card-header">
            <span class="node-action-type">${escHtml(actionType)}</span>
            <span class="node-decision-badge ${outcome}">${getOutcomeLabel(outcome)}${approvalStatus === 'approved' ? ' (approved)' : approvalStatus === 'rejected' ? ' (rejected)' : ''}</span>
          </div>
          <div class="node-meta">
            <span>${timeStr}</span>
            ${resource ? `<span>${escHtml(resource.length > 40 ? '...' + resource.slice(-37) : resource)}</span>` : ''}
            ${durationMs !== undefined ? `<span>${durationMs}ms</span>` : ''}
            <span class="hash">${hashShort}</span>
          </div>
          ${reason ? `<div class="node-reason">${escHtml(reason.length > 120 ? reason.substring(0, 117) + '...' : reason)}</div>` : ''}
          ${isAegisFlagged ? `<div class="node-aegis flagged">AEGIS: ${escHtml(r.metadata.aegisReason || 'Content flagged')}</div>` : ''}
          ${isBroken ? `<div class="node-aegis flagged">CHAIN BREAK: prevReceiptHash does not match previous receipt</div>` : ''}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// ── Show detail panel ──────────────────────────────────────
function showDetail(idx) {
  selectedIdx = idx;
  const r = receipts[idx];
  const overlay = document.getElementById('detailOverlay');
  const backdrop = document.getElementById('backdrop');
  const body = document.getElementById('detailBody');
  const title = document.getElementById('detailTitle');

  const actionType = r.envelope?.action?.type || 'Receipt';
  title.textContent = `#${idx + 1} ${actionType}`;

  let html = '';

  // Core fields
  html += `<div class="detail-section"><h4>Receipt</h4>`;
  html += detailField('ID', r.id);
  html += detailField('Envelope ID', r.envelopeId);
  html += detailField('Timestamp', r.timestamp);
  html += detailField('Status', r.status);
  if (r.parentReceiptId) html += detailField('Parent Receipt', r.parentReceiptId);
  html += `</div>`;

  // Decision
  html += `<div class="detail-section"><h4>Decision</h4>`;
  html += detailField('Outcome', r.decision?.outcome);
  html += detailField('Evaluated At', r.decision?.evaluatedAt);
  html += detailField('Policy ID', r.decision?.policyId);
  html += detailField('Policy Version', r.decision?.policyVersion);
  if (r.decision?.reason) html += detailField('Reason', r.decision.reason);
  if (r.decision?.matchedRules?.length) {
    r.decision.matchedRules.forEach(mr => {
      html += detailField('Matched Rule', `${mr.ruleName || mr.ruleId} (${mr.effect})`);
    });
  }
  html += `</div>`;

  // Approval
  if (r.approval) {
    html += `<div class="detail-section"><h4>Approval</h4>`;
    html += detailField('Status', r.approval.status);
    html += detailField('Requested At', r.approval.requestedAt);
    html += detailField('Responded At', r.approval.respondedAt);
    if (r.approval.respondedBy) {
      html += detailField('Responded By', `${r.approval.respondedBy.name || r.approval.respondedBy.id} (${r.approval.respondedBy.type})`);
    }
    if (r.approval.comment) html += detailField('Comment', r.approval.comment);
    html += detailField('Required Approvals', r.approval.requiredApprovals);
    html += `</div>`;
  }

  // Execution
  if (r.execution) {
    html += `<div class="detail-section"><h4>Execution</h4>`;
    html += detailField('Started At', r.execution.startedAt);
    html += detailField('Completed At', r.execution.completedAt);
    html += detailField('Duration', `${r.execution.durationMs}ms`);
    if (r.execution.error) {
      html += detailField('Error Code', r.execution.error.code);
      html += detailField('Error Message', r.execution.error.message);
    }
    html += `</div>`;
  }

  // Envelope / Action
  if (r.envelope) {
    html += `<div class="detail-section"><h4>Action Envelope</h4>`;
    html += detailField('Action Type', r.envelope.action?.type);
    html += detailField('Resource', r.envelope.action?.resource);
    html += detailField('Operation', r.envelope.action?.operation);
    html += detailField('Principal', `${r.envelope.principal?.name || r.envelope.principal?.id} (${r.envelope.principal?.type})`);
    html += detailField('Session', r.envelope.context?.sessionId);
    html += detailField('Environment', r.envelope.context?.environment);
    if (r.envelope.action?.parameters) {
      html += `<div style="margin-top:8px;"><span style="font-size:12px;color:var(--text-dim)">Parameters:</span></div>`;
      html += `<div class="detail-json">${highlightJson(JSON.stringify(r.envelope.action.parameters, null, 2))}</div>`;
    }
    html += `</div>`;
  }

  // Hash chain
  html += `<div class="detail-section"><h4>Hash Chain</h4>`;
  html += detailField('Receipt Hash', r.receiptHash || 'N/A');
  html += detailField('Prev Receipt Hash', r.prevReceiptHash || 'N/A');
  if (idx > 0) {
    const prevHash = receipts[idx - 1].receiptHash;
    const matches = r.prevReceiptHash === prevHash;
    html += detailField('Chain Link', matches
      ? '<span style="color:var(--green)">Valid - matches previous receipt</span>'
      : '<span style="color:var(--red)">BROKEN - does not match previous receipt</span>');
  } else {
    html += detailField('Chain Link', '<span style="color:var(--text-dim)">Genesis receipt (first in chain)</span>');
  }
  html += `</div>`;

  // Metadata
  if (r.metadata && Object.keys(r.metadata).length) {
    html += `<div class="detail-section"><h4>Metadata</h4>`;
    html += `<div class="detail-json">${highlightJson(JSON.stringify(r.metadata, null, 2))}</div>`;
    html += `</div>`;
  }

  // Full JSON
  html += `<div class="detail-section"><h4>Full Receipt JSON</h4>`;
  html += `<div class="detail-json" style="max-height:500px;">${highlightJson(JSON.stringify(r, null, 2))}</div>`;
  html += `</div>`;

  body.innerHTML = html;
  overlay.classList.add('open');
  backdrop.classList.add('open');

  // Update selected state in timeline
  document.querySelectorAll('.receipt-node').forEach(n => n.classList.remove('selected'));
  const node = document.querySelector(`.receipt-node[data-idx="${idx}"]`);
  if (node) node.classList.add('selected');
}

function detailField(label, value) {
  if (value === undefined || value === null) return '';
  return `<div class="detail-field"><span class="label">${escHtml(label)}</span><span class="value">${typeof value === 'string' && value.startsWith('<') ? value : escHtml(String(value))}</span></div>`;
}

function closeDetail() {
  selectedIdx = -1;
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  document.querySelectorAll('.receipt-node').forEach(n => n.classList.remove('selected'));
}

// ── JSON syntax highlighting ───────────────────────────────
function highlightJson(json) {
  return json.replace(/("(?:\\.|[^"\\])*")\s*:/g, '<span class="j-key">$1</span>:')
    .replace(/:\s*("(?:\\.|[^"\\])*")/g, ': <span class="j-str">$1</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="j-num">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span class="j-bool">$1</span>')
    .replace(/:\s*(null)/g, ': <span class="j-null">$1</span>')
    .replace(/("(?:\\.|[^"\\])*")(?=\s*[,\]\}]|\s*$)/gm, function(match) {
      if (match.includes('j-key') || match.includes('j-str')) return match;
      return '<span class="j-str">' + match + '</span>';
    });
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Keyboard shortcut ──────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

// Auto-load example on page load
loadExample();
visualize();
</script>
